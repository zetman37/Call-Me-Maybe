project]
name = "call-me-maybe"
version = "0.1.0"
description = "Function calling with constrained decoding using a small LLM"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.8.0",
  "numpy>=1.26.0",
  "torch>=2.2.0",
  "transformers>=4.40.0",
  "huggingface_hub>=0.23.0",
]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true

[tool.pytest.ini_options]
pythonpath = ["."]
